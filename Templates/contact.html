{% extends "base.html" %}

{% block title %}Contact Us | ICC Men's T20 World Cup 2026{% endblock title %}

{% block body %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white fw-bold py-3 text-center">
                    <h2 class="mb-0">Get in Touch</h2>
                </div>
                <div class="card-body p-4 p-md-5">
                    <p class="text-center text-muted mb-4">
                        Have a question about the tournament stats or want to contribute to the blog? Send us a message!
                    </p>
                    
                    <form method="POST" action="/contact">
                        {% csrf_token %}
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="email" class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                            </div>
                            
                            <div class="col-12">
                                <label for="subject" class="form-label fw-bold">Subject</label>
                                <input type="text" class="form-control" id="subject" name="subject" placeholder="What is this regarding?" required>
                            </div>
                            
                            <div class="col-12">
                                <label for="message" class="form-label fw-bold">Message</label>
                                <textarea class="form-control" id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                            </div>
                            
                            <div class="col-12 text-center mt-4">
                                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Send Message</button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock body %}
